# Smoke variant of training_niazy_proof_fit.yaml — 1 epoch, smaller batches.
# Use this to verify the pod environment + dataset before launching the full run.
#
# Build dataset first (only if not already on the pod):
#
#   uv run python examples/build_niazy_proof_fit_context_dataset.py \
#     --artifact-bundle output/artifact_libraries/niazy_aas_2x_direct/niazy_aas_direct_artifact.npz \
#     --target-epoch-samples 512 \
#     --context-epochs 7 \
#     --output-dir output/niazy_proof_fit_context_512
#
# Training:
#
#   uv run facet-train fit --config src/facet/models/cascaded_dae/training_niazy_proof_fit_smoke.yaml

model:
  framework: pytorch
  factory: facet.models.cascaded_dae.training:build_model
  kwargs:
    hidden_units: [128, 32, 128]
    dropout_rate: 0.2
  loss_factory: facet.models.cascaded_dae.training:build_loss
  loss_kwargs:
    name: mse
  device: cuda

data:
  dataset_factory: facet.models.cascaded_dae.training:build_dataset
  kwargs:
    path: ./output/niazy_proof_fit_context_512/niazy_proof_fit_context_dataset.npz
    demean_input: true
    demean_target: true
  eeg_only: true

training:
  model_name: CascadedDenoisingAutoencoderNiazySmoke
  chunk_size: 512
  target_type: artifact
  trigger_aligned: false
  val_ratio: 0.2
  max_epochs: 1
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  grad_clip_norm: 1.0
  seed: 42
  output_dir: training_output

checkpoint:
  monitor: loss
  mode: min
  save_top_k: 1
  save_last: true

early_stopping:
  monitor: loss
  mode: min
  patience: 10
  min_delta: 0.000001

logging:
  rich_live: true
  log_file: training.jsonl
  loss_plot_file: loss.png
  val_every_n_epochs: 1
  progress_bar: true

export:
  enabled: true
  format: torchscript
  path: exports/cascaded_dae.ts
  write_inference_config: false
