# Train Cascaded DAE on the Niazy-only proof-fit dataset.
#
# Build dataset first:
#
#   uv run python examples/dataset_building/build_niazy_proof_fit_context_dataset.py \
#     --artifact-bundle output/artifact_libraries/niazy_aas_2x_direct/niazy_aas_direct_artifact.npz \
#     --target-epoch-samples 512 \
#     --context-epochs 7 \
#     --output-dir output/niazy_proof_fit_context_512
#
# Training:
#
#   uv run facet-train fit --config src/facet/models/cascaded_dae/training_niazy_proof_fit.yaml

model:
  framework: pytorch
  factory: facet.models.cascaded_dae.training:build_model
  kwargs:
    # Hidden bumped from [128,32,128] (~280k params) to [512,128,512] (~1.31M)
    # for the Run-1 retrofill. Matched to cascaded_context_dae so the two
    # models share the same encoder/decoder/bottleneck dimensions and the
    # only difference is the input dimension (1*512 here vs 7*1*512 = 3584
    # for the context variant). This makes "what does the 7-epoch context
    # buy us?" a clean controlled ablation. At ~65 params/training-sample
    # the model is well below overfit territory.
    hidden_units: [512, 128, 512]
    dropout_rate: 0.2
  loss_factory: facet.models.cascaded_dae.training:build_loss
  loss_kwargs:
    # L1 instead of MSE. Demucs (the +31 dB winner) uses L1; L1 is more robust
    # to the heavy-tailed artifact amplitude distribution
    # (max_abs_artifact_uv = 13.6 mV, mean_abs_artifact_uv = 0.92 mV per
    # dataset metadata). Bit-identical architecture, L1-vs-MSE swap is a
    # known 1-3 dB swing in source-separation literature.
    name: l1
  device: cuda

data:
  dataset_factory: facet.models.cascaded_dae.training:build_dataset
  kwargs:
    path: ./output/niazy_proof_fit_context_512/niazy_proof_fit_context_dataset.npz
    demean_input: true
    demean_target: true
  eeg_only: true

training:
  model_name: CascadedDenoisingAutoencoderNiazyProofFit
  chunk_size: 512
  target_type: artifact
  trigger_aligned: false
  val_ratio: 0.2
  max_epochs: 50
  batch_size: 128
  learning_rate: 0.001
  weight_decay: 0.0001
  grad_clip_norm: 1.0
  seed: 42
  output_dir: training_output

checkpoint:
  monitor: loss
  mode: min
  save_top_k: 2
  save_last: true

early_stopping:
  monitor: loss
  mode: min
  patience: 10
  min_delta: 0.000001

logging:
  rich_live: true
  log_file: training.jsonl
  loss_plot_file: loss.png
  val_every_n_epochs: 1
  progress_bar: true

export:
  enabled: true
  format: torchscript
  path: exports/cascaded_dae.ts
  write_inference_config: false
