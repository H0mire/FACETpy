# Smoke training config for Demucs on the Niazy proof-fit context dataset.
# Verifies dataset build, GPU execution, one-epoch step, checkpoint, and
# TorchScript export before committing to a full run.

model:
  framework: pytorch
  factory: facet.models.demucs.training:build_model
  kwargs:
    depth: 4
    initial_channels: 32
    kernel_size: 8
    stride: 4
    lstm_layers: 2
    in_channels: 1
    out_channels: 1
    n_sources: 1
    rescale: 0.1
  loss_factory: facet.models.demucs.training:build_loss
  loss_kwargs:
    name: l1
  device: cuda

data:
  dataset_factory: facet.models.demucs.training:build_dataset
  kwargs:
    path: ./output/niazy_proof_fit_context_512/niazy_proof_fit_context_dataset.npz
    context_epochs: 7
    demean_input: true
    demean_target: true
    max_examples: 512
  eeg_only: true

training:
  model_name: DemucsNiazySmoke
  chunk_size: 3584
  target_type: artifact
  trigger_aligned: true
  val_ratio: 0.2
  max_epochs: 1
  batch_size: 16
  learning_rate: 0.0003
  weight_decay: 0.0
  grad_clip_norm: 5.0
  seed: 42
  output_dir: training_output

checkpoint:
  monitor: loss
  mode: min
  save_top_k: 1
  save_last: true

early_stopping:
  monitor: loss
  mode: min
  patience: 5
  min_delta: 0.000001

logging:
  rich_live: true
  log_file: training.jsonl
  loss_plot_file: loss.png
  val_every_n_epochs: 1
  progress_bar: true

export:
  enabled: true
  format: torchscript
  path: exports/demucs.ts
  write_inference_config: false
