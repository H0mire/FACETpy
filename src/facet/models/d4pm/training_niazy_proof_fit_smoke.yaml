# Smoke training of D4PM on the Niazy proof-fit dataset.
#
# Build dataset first (same as the full config):
#
#   uv run python examples/build_niazy_proof_fit_context_dataset.py \
#     --artifact-bundle output/artifact_libraries/niazy_aas_2x_direct/niazy_aas_direct_artifact.npz \
#     --target-epoch-samples 512 \
#     --context-epochs 7 \
#     --output-dir output/niazy_proof_fit_context_512

model:
  framework: pytorch
  factory: facet.models.d4pm.training:build_model
  kwargs:
    epoch_samples: 512
    num_steps: 200
    beta_start: 0.0001
    beta_end: 0.02
    feats: 32
    d_model: 64
    d_ff: 256
    n_heads: 2
    n_layers: 2
    embed_dim: 64
  loss_factory: facet.models.d4pm.training:build_loss
  loss_kwargs:
    kind: l1
  device: cuda

data:
  dataset_factory: facet.models.d4pm.training:build_dataset
  kwargs:
    path: ./output/niazy_proof_fit_context_512/niazy_proof_fit_context_dataset.npz
    demean_input: true
    demean_target: true
    max_examples: 2048
  eeg_only: true

training:
  model_name: D4PMArtifactDiffusionNiazySmoke
  chunk_size: 512
  target_type: artifact
  trigger_aligned: true
  val_ratio: 0.2
  max_epochs: 1
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.0001
  grad_clip_norm: 1.0
  seed: 42
  output_dir: training_output

checkpoint:
  monitor: loss
  mode: min
  save_top_k: 1
  save_last: true

early_stopping:
  monitor: loss
  mode: min
  patience: 10
  min_delta: 0.000001

logging:
  rich_live: true
  log_file: training.jsonl
  loss_plot_file: loss.png
  val_every_n_epochs: 1
  progress_bar: true

export:
  enabled: true
  format: torchscript
  path: exports/d4pm.ts
  example_input_shape: [1, 2, 512]
  write_inference_config: false
