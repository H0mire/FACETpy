# Train SepFormer on the Niazy-only proof-fit context dataset.
#
# Build dataset first (only if it is not already present on the worker):
#
#   uv run python examples/build_niazy_proof_fit_context_dataset.py \
#     --artifact-bundle output/artifact_libraries/niazy_aas_2x_direct/niazy_aas_direct_artifact.npz \
#     --target-epoch-samples 512 \
#     --context-epochs 7 \
#     --output-dir output/niazy_proof_fit_context_512
#
# Training:
#
#   uv run facet-train fit --config src/facet/models/sepformer/training_niazy_proof_fit.yaml

model:
  framework: pytorch
  factory: facet.models.sepformer.training:build_model
  kwargs:
    epoch_samples: 512
    context_epochs: 7
    encoder_channels: 128
    encoder_kernel: 16
    encoder_stride: 8
    chunk_size: 64
    n_blocks: 2
    intra_layers: 4
    inter_layers: 4
    intra_heads: 4
    inter_heads: 4
    d_ffn: 256
    dropout: 0.1
    skip_around_intra: true
    mask_activation: relu
  loss_factory: facet.models.sepformer.training:build_loss
  loss_kwargs:
    name: mse
  device: cuda

data:
  dataset_factory: facet.models.sepformer.training:build_dataset
  kwargs:
    path: ./output/niazy_proof_fit_context_512/niazy_proof_fit_context_dataset.npz
    context_epochs: 7
    demean_input: true
    demean_target: true
  eeg_only: true

training:
  model_name: SepFormerNiazyProofFit
  chunk_size: 512
  target_type: artifact
  trigger_aligned: true
  val_ratio: 0.2
  max_epochs: 50
  batch_size: 64
  learning_rate: 0.0005
  weight_decay: 0.0001
  grad_clip_norm: 1.0
  seed: 42
  output_dir: training_output

checkpoint:
  monitor: loss
  mode: min
  save_top_k: 2
  save_last: true

early_stopping:
  monitor: loss
  mode: min
  patience: 10
  min_delta: 0.000001

logging:
  rich_live: true
  log_file: training.jsonl
  loss_plot_file: loss.png
  val_every_n_epochs: 1
  progress_bar: true

export:
  enabled: true
  format: torchscript
  path: exports/sepformer.ts
  write_inference_config: false
