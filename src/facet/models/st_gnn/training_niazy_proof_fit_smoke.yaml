# Smoke training run for ST-GNN. Single epoch on a tiny subset to verify
# worktree sync, dataset preparation, CUDA availability, checkpoint
# writing, training.jsonl, loss.png, and TorchScript export end-to-end.

model:
  framework: pytorch
  factory: facet.models.st_gnn.training:build_model
  kwargs:
    hidden_channels: 16
    time_kernel: 3
    k_order: 3
    dropout: 0.1
    knn_k: 4
  loss_factory: facet.models.st_gnn.training:build_loss
  loss_kwargs:
    name: mse
  device: cuda

data:
  dataset_factory: facet.models.st_gnn.training:build_dataset
  kwargs:
    path: ./output/niazy_proof_fit_context_512/niazy_proof_fit_context_dataset.npz
    max_examples: 64
    demean_input: true
    demean_target: true
  eeg_only: true

training:
  model_name: SpatiotemporalGNNNiazySmoke
  chunk_size: 512
  target_type: artifact
  trigger_aligned: true
  val_ratio: 0.2
  max_epochs: 1
  batch_size: 16
  learning_rate: 0.001
  weight_decay: 0.0001
  grad_clip_norm: 1.0
  seed: 42
  output_dir: training_output

checkpoint:
  monitor: loss
  mode: min
  save_top_k: 1
  save_last: true

early_stopping:
  monitor: loss
  mode: min
  patience: 10
  min_delta: 0.000001

logging:
  rich_live: true
  log_file: training.jsonl
  loss_plot_file: loss.png
  val_every_n_epochs: 1
  progress_bar: true

export:
  enabled: true
  format: torchscript
  path: exports/st_gnn.ts
  write_inference_config: false
