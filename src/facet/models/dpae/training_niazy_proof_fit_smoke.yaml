# Smoke training config for DPAE on the Niazy proof-fit dataset.
#
# Identical to training_niazy_proof_fit.yaml but: max_epochs=1,
# small base_filters/latent_filters to keep total time well under one minute,
# and capped via max_examples through the dataset factory.

model:
  framework: pytorch
  factory: facet.models.dpae.training:build_model
  kwargs:
    base_filters: 8
    latent_filters: 16
    residual_init: 0.0
  loss_factory: facet.models.dpae.training:build_loss
  loss_kwargs:
    name: mse
  device: cuda

data:
  dataset_factory: facet.models.dpae.training:build_dataset
  kwargs:
    path: ./output/niazy_proof_fit_context_512/niazy_proof_fit_context_dataset.npz
    demean_input: true
    demean_target: true
    max_examples: 256
  eeg_only: true

training:
  model_name: DualPathwayAutoencoderNiazySmoke
  chunk_size: 512
  target_type: artifact
  trigger_aligned: false
  val_ratio: 0.2
  max_epochs: 1
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.0001
  grad_clip_norm: 1.0
  seed: 42
  output_dir: training_output

checkpoint:
  monitor: loss
  mode: min
  save_top_k: 1
  save_last: true

early_stopping:
  monitor: loss
  mode: min
  patience: 5
  min_delta: 0.000001

logging:
  rich_live: true
  log_file: training.jsonl
  loss_plot_file: loss.png
  val_every_n_epochs: 1
  progress_bar: true

export:
  enabled: true
  format: torchscript
  path: exports/dpae.ts
  write_inference_config: false
