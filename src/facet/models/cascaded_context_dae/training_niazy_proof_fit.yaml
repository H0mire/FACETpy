# Train Cascaded Context DAE on the Niazy-only proof-fit dataset.
#
# Build dataset first:
#
#   uv run python examples/build_niazy_proof_fit_context_dataset.py \
#     --artifact-bundle output/artifact_libraries/niazy_aas_2x_direct/niazy_aas_direct_artifact.npz \
#     --target-epoch-samples 512 \
#     --context-epochs 7 \
#     --output-dir output/niazy_proof_fit_context_512
#
# Training:
#
#   uv run facet-train fit --config src/facet/models/cascaded_context_dae/training_niazy_proof_fit.yaml

model:
  framework: pytorch
  factory: facet.models.cascaded_context_dae.training:build_model
  kwargs:
    # Hidden bumped from [512,128,512] (~4.5M params) to [768,192,768] (~7M)
    # for the Run-1 retrofill. Rationale: input dim is 3584 (7*512), so a
    # 512→128 bottleneck is a 28x compression on a high-frequency signal —
    # likely an information bottleneck. ~7M params sits between Conv-TasNet
    # (~5M) and Demucs (16.6M) in the Run-1 lineup; still safe vs overfit
    # on 19992 training pairs (~350 params/sample) given dropout=0.2.
    hidden_units: [768, 192, 768]
    dropout_rate: 0.2
  loss_factory: facet.models.cascaded_context_dae.training:build_loss
  loss_kwargs:
    # L1 instead of MSE — see cascaded_dae YAML for full rationale. Tldr:
    # Demucs (+31 dB) uses L1, MSE-trained autoencoder-style models
    # (DPAE +7.5 dB, old DAE +3 dB) stagnated lower.
    name: l1
  device: cuda

data:
  dataset_factory: facet.models.cascaded_context_dae.training:build_dataset
  kwargs:
    path: ./output/niazy_proof_fit_context_512/niazy_proof_fit_context_dataset.npz
    context_epochs: 7
    demean_input: true
    demean_target: true
  eeg_only: true

training:
  model_name: CascadedContextDenoisingAutoencoderNiazyProofFit
  chunk_size: 512
  target_type: artifact
  trigger_aligned: true
  val_ratio: 0.2
  max_epochs: 50
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  grad_clip_norm: 1.0
  seed: 42
  output_dir: training_output

checkpoint:
  monitor: loss
  mode: min
  save_top_k: 2
  save_last: true

early_stopping:
  monitor: loss
  mode: min
  patience: 10
  min_delta: 0.000001

logging:
  rich_live: true
  log_file: training.jsonl
  loss_plot_file: loss.png
  val_every_n_epochs: 1
  progress_bar: true

export:
  enabled: true
  format: torchscript
  path: exports/cascaded_context_dae.ts
  write_inference_config: false
