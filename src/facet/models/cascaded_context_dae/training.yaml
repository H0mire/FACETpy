# Train Cascaded Context DAE: 7-epoch channel-wise context autoencoder.
#
# Prerequisite:
#
#   uv run python examples/dataset_building/build_epoch_context_dataset.py \
#     --clean-source output/synthetic_spike_source/synthetic_spike_source_raw.fif::spike_onset \
#     --artifact-library output/artifact_libraries/niazy_aas_2x_direct/niazy_aas_direct_artifact.npz \
#     --artifact-library output/artifact_libraries/large_mff_aas/large_mff_aas_artifact.npz \
#     --target-epoch-samples 512 \
#     --context-epochs 7 \
#     --output-dir output/synthetic_spike_artifact_context_512
#
# Training:
#
#   uv run facet-train fit --config src/facet/models/cascaded_context_dae/training.yaml

model:
  framework: pytorch
  factory: facet.models.cascaded_context_dae.training:build_model
  kwargs:
    hidden_units: [512, 128, 512]
    dropout_rate: 0.2
  loss_factory: facet.models.cascaded_context_dae.training:build_loss
  loss_kwargs:
    name: mse
  device: cpu

data:
  dataset_factory: facet.models.cascaded_context_dae.training:build_dataset
  kwargs:
    path: ./output/synthetic_spike_artifact_context_512/synthetic_spike_artifact_context_dataset.npz
    context_epochs: 7
    demean_input: true
    demean_target: true
  eeg_only: true

training:
  model_name: CascadedContextDenoisingAutoencoder
  chunk_size: 512
  target_type: artifact
  trigger_aligned: true
  val_ratio: 0.2
  max_epochs: 50
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  grad_clip_norm: 1.0
  seed: 42
  output_dir: training_output

checkpoint:
  monitor: loss
  mode: min
  save_top_k: 2
  save_last: true

early_stopping:
  monitor: loss
  mode: min
  patience: 10
  min_delta: 0.000001

logging:
  rich_live: true
  log_file: training.jsonl
  loss_plot_file: loss.png
  val_every_n_epochs: 1
  progress_bar: true

export:
  enabled: true
  format: torchscript
  path: exports/cascaded_context_dae.ts
  write_inference_config: false
